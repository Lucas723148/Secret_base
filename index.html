<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的 GitHub Pages 网站</title>
    <meta name="description" content="这是我在 GitHub Pages 上托管的个人网站。">
    
    <!-- 简单的内联样式，你也可以将其移动到单独的 style.css 文件中 -->
    <style>
        :root {
            --primary-color: #0366d6; /* GitHub Blue */
            --text-color: #24292e;
            --bg-color: #ffffff;
            --secondary-bg: #f6f8fa;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--secondary-bg);
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 1px solid #e1e4e8;
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #586069;
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        main {
            flex: 1;
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: var(--secondary-bg);
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .btn {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: #0255b3;
        }

        footer {
            text-align: center;
            padding: 1.5rem;
            background-color: var(--secondary-bg);
            border-top: 1px solid #e1e4e8;
            color: #586069;
            font-size: 0.9rem;
        }

        /* 移动端适配 */
        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            main { margin: 1rem auto; }
        }
    </style>
</head>
<body>

    <header>
        <h1>你好，世界! 👋</h1>
        <p class="subtitle">欢迎来到Lucas的 GitHub Pages 主页</p>
    </header>

    <main>
        <section class="card">
            <h2>关于这个项目</h2>
            <p>这个页面是通过 <strong>GitHub Pages</strong> 静态托管的。你可以修改这个 <code>index.html</code> 文件来展示你的项目、简历或博客。</p>
        </section>

        <section class="card">
            <h2>快速开始</h2>
            <ol>
                <li>创建一个名为 <code>username.github.io</code> 的仓库 (将 <code>username</code> 替换为你的 GitHub 用户名)。</li>
                <li>将此文件上传到仓库根目录。</li>
                <li>等待几分钟，访问 <code>https://username.github.io</code> 即可查看效果。</li>
            </ol>
        </section>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="https://github.com" class="btn" target="_blank" rel="noopener noreferrer">查看我的 GitHub</a>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 你的名字。由 GitHub Pages 驱动。</p>
    </footer>

</body>
</html>
